<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}MYKMAN Music{% endblock %}</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #111; color: #eee; -webkit-text-size-adjust: 100%; }
  header { padding: 0.9rem 1rem; background: #1a1a1a; border-bottom: 1px solid #333; display:flex; flex-wrap:wrap; gap:0.25rem 1rem; align-items:center; }
  header a { color: #eee; text-decoration: none; font-size: 0.95rem; }
  header a:hover { color: #6af; }
  main { padding: 1rem; max-width: 1100px; margin: 0 auto; }
  button { background:#2a2a2a; color:#eee; border:1px solid #444; padding:0.55rem 0.9rem; border-radius:6px; cursor:pointer; font-size:0.9rem; }
  button:hover { background:#333; border-color:#666; }
  @media (max-width: 700px) {
    main { padding: 0.75rem; }
    table { font-size: 0.85rem; }
    th, td { padding: 0.4rem 0.5rem; }
    .stat { min-width: 90px; }
    .stat .num { font-size: 1.3rem; }
    #pair { flex-direction: column; }
    #pair .card { font-size: 1rem; }
  }
  h1, h2 { font-weight: 600; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
  th { color: #999; font-weight: 500; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
  tr:hover td { background: #1a1a1a; }
  .stat { display: inline-block; padding: 0.75rem 1rem; background: #1a1a1a; border-radius: 6px; margin: 0.25rem; min-width: 120px; }
  .stat .num { font-size: 1.6rem; font-weight: 600; color: #6af; }
  .stat .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
  a { color: #6af; }
  input[type=text] { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 0.5rem; border-radius: 4px; width: 300px; }
</style>
</head>
<body>
<header>
  <a href="/"><strong>MYKMAN Music</strong></a>
  <a href="/compare">Compare</a>
  <a href="/songs">Songs</a>
  <a href="/albums">Albums</a>
  <a href="/artists">Artists</a>
  <a href="/stats">Stats</a>
  <a href="/notes">MYK Thoughts</a>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>

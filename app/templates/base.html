<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}MYKMAN Music{% endblock %}</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #111; color: #eee; }
  header { padding: 1rem 1.5rem; background: #1a1a1a; border-bottom: 1px solid #333; }
  header a { color: #eee; margin-right: 1rem; text-decoration: none; }
  header a:hover { color: #6af; }
  main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
  h1, h2 { font-weight: 600; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #2a2a2a; font-size: 0.9rem; }
  th { color: #999; font-weight: 500; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
  tr:hover td { background: #1a1a1a; }
  .stat { display: inline-block; padding: 0.75rem 1rem; background: #1a1a1a; border-radius: 6px; margin: 0.25rem; min-width: 120px; }
  .stat .num { font-size: 1.6rem; font-weight: 600; color: #6af; }
  .stat .label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
  a { color: #6af; }
  input[type=text] { background: #1a1a1a; border: 1px solid #333; color: #eee; padding: 0.5rem; border-radius: 4px; width: 300px; }
</style>
</head>
<body>
<header>
  <a href="/"><strong>MYKMAN Music</strong></a>
  <a href="/compare">Compare</a>
  <a href="/songs">Songs</a>
  <a href="/albums">Albums</a>
  <a href="/artists">Artists</a>
  <a href="/stats">Stats</a>
  <a href="/notes">Notes</a>
</header>
<main>{% block content %}{% endblock %}</main>
</body>
</html>

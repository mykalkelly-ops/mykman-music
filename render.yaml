services:
  - type: web
    name: mykman-music
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MYKMAN_DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: KOFI_URL
        sync: false
      - key: KOFI_VERIFICATION_TOKEN
        sync: false
      - key: MYKMAN_ADMIN_PASSWORD
        sync: false
    disk:
      name: mykman-data
      mountPath: /var/data
      sizeGB: 5
